<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="13">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#475569"/></marker>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#dc2626"/></marker>
  </defs>
  <rect width="1100" height="720" fill="#fff"/>
  <text x="550" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">Plugin architecture — sandbox + capability model</text>
  <text x="550" y="58" text-anchor="middle" font-size="12" fill="#64748b">Default-deny. Every privileged operation requires a granted capability. Resources capped.</text>

  <!-- Host -->
  <g>
    <rect x="40" y="100" width="500" height="540" rx="14" fill="#eff6ff" stroke="#1d4ed8" stroke-width="2"/>
    <text x="290" y="128" text-anchor="middle" font-weight="700" fill="#1d4ed8">BooksForge Host (Rust + WebView)</text>

    <!-- Host components -->
    <rect x="60" y="148" width="200" height="60" rx="8" fill="#fff" stroke="#1d4ed8"/>
    <text x="160" y="170" text-anchor="middle" font-weight="600">Plugin orchestrator</text>
    <text x="160" y="188" text-anchor="middle" fill="#475569" font-size="12">load • dispatch • lifecycle</text>

    <rect x="280" y="148" width="240" height="60" rx="8" fill="#fff" stroke="#1d4ed8"/>
    <text x="400" y="170" text-anchor="middle" font-weight="600">Capability dispatcher</text>
    <text x="400" y="188" text-anchor="middle" fill="#475569" font-size="12">checks token on every call</text>

    <rect x="60" y="228" width="460" height="80" rx="8" fill="#fff" stroke="#1d4ed8"/>
    <text x="290" y="252" text-anchor="middle" font-weight="600">WIT-typed host API</text>
    <text x="290" y="272" text-anchor="middle" fill="#475569" font-size="12">read-manuscript • emit-issue • emit-suggestion • http-fetch (proxied)</text>
    <text x="290" y="290" text-anchor="middle" fill="#94a3b8" font-size="11">all calls = capability check + audit log</text>

    <rect x="60" y="328" width="460" height="80" rx="8" fill="#fff" stroke="#1d4ed8"/>
    <text x="290" y="352" text-anchor="middle" font-weight="600">Resource governor</text>
    <text x="290" y="372" text-anchor="middle" fill="#475569" font-size="12">memory ≤ 256 MB • wall ≤ 30 s • CPU ≤ 10 s</text>
    <text x="290" y="390" text-anchor="middle" fill="#94a3b8" font-size="11">violations → kill task, typed error to user</text>

    <rect x="60" y="428" width="460" height="80" rx="8" fill="#fff" stroke="#1d4ed8"/>
    <text x="290" y="452" text-anchor="middle" font-weight="600">Manifest + signature verifier</text>
    <text x="290" y="472" text-anchor="middle" fill="#475569" font-size="12">marketplace plugins signed; sideload warned</text>
    <text x="290" y="490" text-anchor="middle" fill="#94a3b8" font-size="11">capability prompt UI for new / expanded grants</text>

    <rect x="60" y="528" width="460" height="92" rx="8" fill="#fff" stroke="#1d4ed8"/>
    <text x="290" y="552" text-anchor="middle" font-weight="600">User-granted capabilities</text>
    <text x="290" y="572" text-anchor="middle" fill="#475569" font-size="12">read-manuscript • read-bibliography • write-suggestions</text>
    <text x="290" y="590" text-anchor="middle" fill="#475569" font-size="12">network-domain:foo.com • ui-panel-side • ai-prompt-overlay</text>
    <text x="290" y="608" text-anchor="middle" fill="#94a3b8" font-size="11">stored per plugin install; revocable from settings</text>
  </g>

  <!-- Compute plugin (WASM) -->
  <g>
    <rect x="580" y="100" width="240" height="240" rx="14" fill="#fdf2f8" stroke="#9d174d" stroke-width="2"/>
    <text x="700" y="128" text-anchor="middle" font-weight="700" fill="#9d174d">Compute plugin</text>
    <text x="700" y="148" text-anchor="middle" font-size="12" fill="#475569">WASM (wasmtime + WASI-p2)</text>
    <text x="700" y="174" text-anchor="middle" font-size="12" fill="#334155" font-weight="600">Default deny:</text>
    <text x="700" y="192" text-anchor="middle" font-size="12" fill="#334155">no FS • no clock • no random</text>
    <text x="700" y="210" text-anchor="middle" font-size="12" fill="#334155">no env • no network</text>
    <text x="700" y="240" text-anchor="middle" font-size="12" fill="#334155" font-weight="600">Allowed only via host API</text>
    <text x="700" y="262" text-anchor="middle" font-size="12" fill="#475569">with capability tokens</text>
    <text x="700" y="296" text-anchor="middle" font-size="11" fill="#94a3b8">Used for: validators, importers,</text>
    <text x="700" y="314" text-anchor="middle" font-size="11" fill="#94a3b8">exporters, scripts</text>
  </g>

  <!-- UI plugin (WebView) -->
  <g>
    <rect x="840" y="100" width="240" height="240" rx="14" fill="#fefce8" stroke="#a16207" stroke-width="2"/>
    <text x="960" y="128" text-anchor="middle" font-weight="700" fill="#854d0e">UI plugin</text>
    <text x="960" y="148" text-anchor="middle" font-size="12" fill="#475569">isolated Tauri WebView</text>
    <text x="960" y="174" text-anchor="middle" font-size="12" fill="#334155" font-weight="600">Origin:</text>
    <text x="960" y="192" text-anchor="middle" font-size="12" fill="#334155">booksforge://plugin/&lt;id&gt;/</text>
    <text x="960" y="216" text-anchor="middle" font-size="12" fill="#334155" font-weight="600">CSP strict by default</text>
    <text x="960" y="234" text-anchor="middle" font-size="12" fill="#475569">no fetch • no XHR direct</text>
    <text x="960" y="266" text-anchor="middle" font-size="12" fill="#334155" font-weight="600">Host IPC mediated</text>
    <text x="960" y="284" text-anchor="middle" font-size="12" fill="#475569">all calls capability-checked</text>
    <text x="960" y="316" text-anchor="middle" font-size="11" fill="#94a3b8">Used for: side panels, modals</text>
  </g>

  <!-- Capability arrows -->
  <line x1="580" y1="200" x2="540" y2="240" stroke="#dc2626" stroke-width="2" marker-end="url(#ar)"/>
  <text x="555" y="226" font-size="11" fill="#dc2626">request</text>

  <line x1="540" y1="280" x2="580" y2="240" stroke="#475569" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#a)"/>
  <text x="555" y="312" font-size="11" fill="#475569">grant token</text>

  <line x1="840" y1="200" x2="540" y2="240" stroke="#dc2626" stroke-width="2" marker-end="url(#ar)"/>
  <line x1="540" y1="280" x2="840" y2="240" stroke="#475569" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#a)"/>

  <!-- Plugin types -->
  <g>
    <rect x="580" y="360" width="500" height="280" rx="14" fill="#f8fafc" stroke="#475569"/>
    <text x="830" y="388" text-anchor="middle" font-weight="700" fill="#0f172a">Plugin types (V1.x)</text>
    <g font-size="12" fill="#0f172a">
      <text x="600" y="416" font-weight="600">Template</text>
      <text x="700" y="416" fill="#475569">declarative; project skeleton + style rules</text>
      <text x="600" y="438" font-weight="600">Validator</text>
      <text x="700" y="438" fill="#475569">WASM; pure rule (project) → issue[]</text>
      <text x="600" y="460" font-weight="600">Prompt-pack</text>
      <text x="700" y="460" fill="#475569">declarative; AI presets + overlays</text>
      <text x="600" y="482" font-weight="600">UI panel</text>
      <text x="700" y="482" fill="#475569">WebView; side / modal panels</text>
      <text x="600" y="504" font-weight="600">Importer</text>
      <text x="700" y="504" fill="#475569">WASM; V1.5+; reads file, stages output</text>
      <text x="600" y="526" font-weight="600">Exporter</text>
      <text x="700" y="526" fill="#475569">WASM; V1.5+; writes to host-supplied path</text>
      <text x="600" y="548" font-weight="600">Script</text>
      <text x="700" y="548" fill="#475569">V2.0; background tasks with explicit caps</text>
    </g>
    <text x="600" y="582" font-weight="700" fill="#0f172a">Distribution</text>
    <text x="600" y="602" fill="#475569" font-size="12">Marketplace (signed, reviewed) • Sideload (warning shown)</text>
    <text x="600" y="622" fill="#475569" font-size="12">Developer mode (load from folder, hot reload, lints enforced)</text>
  </g>
</svg>
