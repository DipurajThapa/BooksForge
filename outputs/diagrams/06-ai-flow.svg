<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13">
  <style>
    .panel { fill: #f7f9fc; stroke: #1f3a68; stroke-width: 1.5; }
    .panel-label { fill: #1f3a68; font-weight: 700; font-size: 14px; }
    .ui { fill: #f0e6ff; stroke: #6a4ab0; }
    .orch { fill: #e6f7ee; stroke: #2c8a4e; }
    .agent { fill: #eaf3ff; stroke: #2566b3; }
    .mvp-agent { fill: #d8eaff; stroke: #1f4a8a; stroke-width: 1.5; }
    .ollama { fill: #fff4e6; stroke: #c47b1f; stroke-width: 1.5; stroke-dasharray: 4,3; }
    .store { fill: #fbe9e7; stroke: #b9281e; }
    .text { fill: #1c2a44; font-weight: 600; }
    .subtle { fill: #4d5b75; font-size: 11px; }
    .arrow { fill: none; stroke: #5a6478; stroke-width: 1.5; marker-end: url(#arr); }
    .arrow-strong { fill: none; stroke: #1f4a8a; stroke-width: 2; marker-end: url(#arr-strong); }
    .arrow-back { fill: none; stroke: #2c8a4e; stroke-width: 1.5; stroke-dasharray: 5,3; marker-end: url(#arr-back); }
    .title { fill: #0e1726; font-weight: 700; font-size: 18px; }
    .heading { fill: #1f3a68; font-weight: 700; font-size: 13px; }
    .note { fill: #4d5b75; font-style: italic; font-size: 11px; }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#5a6478"/>
    </marker>
    <marker id="arr-strong" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f4a8a"/>
    </marker>
    <marker id="arr-back" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2c8a4e"/>
    </marker>
  </defs>

  <text x="20" y="32" class="title">BooksForge — Agent Swarm + Ollama Flow</text>
  <text x="20" y="50" class="subtitle">Bounded agent swarm via Ollama HTTP. No tools. No recursion. User-gated. Pre-edit snapshot before any apply.</text>

  <!-- UI -->
  <rect x="20" y="80" width="280" height="140" class="panel"/>
  <text x="32" y="102" class="panel-label">UI (React)</text>
  <rect x="40" y="115" width="240" height="40" class="ui" rx="6"/>
  <text x="55" y="139" class="text">User invokes workflow</text>
  <rect x="40" y="165" width="240" height="40" class="ui" rx="6"/>
  <text x="55" y="180" class="text">Context Preview</text>
  <text x="55" y="196" class="subtle">"Send equals preview" — no hidden additions</text>

  <!-- Orchestrator -->
  <rect x="340" y="80" width="320" height="380" class="panel"/>
  <text x="352" y="102" class="panel-label">Orchestrator (Layer 4 — Rust)</text>
  <rect x="360" y="115" width="280" height="40" class="orch" rx="6"/>
  <text x="375" y="139" class="text">Capability + AI-enabled check</text>
  <rect x="360" y="165" width="280" height="40" class="orch" rx="6"/>
  <text x="375" y="180" class="text">ContextBuilder</text>
  <text x="375" y="196" class="subtle">memory + vocab + style + scope text</text>
  <rect x="360" y="215" width="280" height="40" class="orch" rx="6"/>
  <text x="375" y="240" class="text">Render prompt (MiniJinja, hash-pinned)</text>
  <rect x="360" y="265" width="280" height="40" class="orch" rx="6"/>
  <text x="375" y="289" class="text">Hard caps: 8 calls / 10 min / 200k tokens / 3 retries</text>
  <rect x="360" y="315" width="280" height="40" class="orch" rx="6"/>
  <text x="375" y="339" class="text">Schema + semantic + cross-cutting validation</text>
  <rect x="360" y="365" width="280" height="40" class="orch" rx="6"/>
  <text x="375" y="389" class="text">User gate (proposals only)</text>
  <rect x="360" y="415" width="280" height="40" class="orch" rx="6"/>
  <text x="375" y="439" class="text">On accept: pre_agent_edit snapshot, then apply</text>

  <!-- Agents catalog -->
  <rect x="700" y="80" width="480" height="380" class="panel"/>
  <text x="712" y="102" class="panel-label">Agent catalog — 9 MVP / 19 total</text>
  <text x="712" y="120" class="heading">MVP agents (run via Ollama, schema-typed I/O):</text>
  <rect x="720" y="130" width="220" height="30" class="agent mvp-agent" rx="5"/>
  <text x="735" y="150" class="text">Project Intake</text>
  <rect x="950" y="130" width="220" height="30" class="agent mvp-agent" rx="5"/>
  <text x="965" y="150" class="text">Outline Architect</text>
  <rect x="720" y="165" width="220" height="30" class="agent mvp-agent" rx="5"/>
  <text x="735" y="185" class="text">Memory Curator</text>
  <rect x="950" y="165" width="220" height="30" class="agent mvp-agent" rx="5"/>
  <text x="965" y="185" class="text">Vocabulary Dictionary</text>
  <rect x="720" y="200" width="220" height="30" class="agent mvp-agent" rx="5"/>
  <text x="735" y="220" class="text">Chapter Drafting (opt-in)</text>
  <rect x="950" y="200" width="220" height="30" class="agent mvp-agent" rx="5"/>
  <text x="965" y="220" class="text">Developmental Editor</text>
  <rect x="720" y="235" width="220" height="30" class="agent mvp-agent" rx="5"/>
  <text x="735" y="255" class="text">Continuity</text>
  <rect x="950" y="235" width="220" height="30" class="agent mvp-agent" rx="5"/>
  <text x="965" y="255" class="text">Copyeditor</text>
  <rect x="720" y="270" width="220" height="30" class="agent mvp-agent" rx="5"/>
  <text x="735" y="290" class="text">Humanization</text>

  <text x="712" y="320" class="heading">V1.0+ agents (deferred):</text>
  <rect x="720" y="330" width="450" height="25" class="agent" rx="4"/>
  <text x="735" y="347" class="text">Book Strategy • Research Organizer • Chapter Planning • Line Editor • Style Guide</text>
  <rect x="720" y="360" width="450" height="25" class="agent" rx="4"/>
  <text x="735" y="377" class="text">Fact-Check • Formatting • ePUB Export QA • Final Review</text>

  <text x="712" y="410" class="heading">Quick-action presets (NOT agents — single-shot):</text>
  <rect x="720" y="420" width="450" height="25" class="agent" rx="4" fill="#fff4e6" stroke="#c47b1f"/>
  <text x="735" y="437" class="text">Sharpen • Continue • Rephrase • Shorten • Expand</text>

  <!-- Ollama runtime -->
  <rect x="20" y="490" width="640" height="140" class="panel"/>
  <text x="32" y="512" class="panel-label">Ollama runtime (separate process; user-controlled)</text>
  <rect x="40" y="525" width="600" height="40" class="ollama" rx="6"/>
  <text x="55" y="550" class="text">HTTP API on 127.0.0.1:11434 — /api/version /api/tags /api/pull /api/show /api/chat /api/generate</text>
  <rect x="40" y="575" width="600" height="40" class="ollama" rx="6"/>
  <text x="55" y="600" class="text">Models: qwen2.5:7b • llama3.1:8b • mistral:7b • gemma2:9b • phi3.5 (curated registry)</text>

  <!-- Storage / audit -->
  <rect x="700" y="490" width="480" height="140" class="panel"/>
  <text x="712" y="512" class="panel-label">Audit + storage</text>
  <rect x="720" y="525" width="450" height="40" class="store" rx="6"/>
  <text x="735" y="550" class="text">agent_runs / agent_tasks / agent_outputs / agent_applied_edits</text>
  <rect x="720" y="575" width="450" height="40" class="store" rx="6"/>
  <text x="735" y="600" class="text">Outputs over 4 KB → agent_runs/run_id/task_id.json</text>

  <!-- Connectors -->
  <line x1="280" y1="135" x2="360" y2="135" class="arrow-strong"/>
  <line x1="280" y1="185" x2="360" y2="185" class="arrow"/>
  <line x1="660" y1="245" x2="700" y2="200" class="arrow-strong"/>
  <line x1="660" y1="290" x2="700" y2="270" class="arrow-strong"/>
  <line x1="700" y1="155" x2="660" y2="200" class="arrow-back"/>

  <line x1="500" y1="460" x2="500" y2="490" class="arrow"/>
  <line x1="500" y1="630" x2="500" y2="660" class="arrow-back"/>

  <line x1="660" y1="285" x2="700" y2="545" class="arrow" stroke-dasharray="3,2"/>

  <!-- Legend -->
  <rect x="20" y="670" width="1160" height="70" class="panel"/>
  <text x="32" y="692" class="panel-label">Invariants</text>
  <text x="32" y="713" class="subtle">No tools. No agent-spawned-agent. No manuscript write without user accept + pre-edit snapshot. Every output schema-validated. Every run audited.</text>
  <text x="32" y="730" class="subtle">Local-first: with network mocked-fail, every flow except OllamaSetup install / pull / update check still works. Telemetry off by default.</text>

  <text x="20" y="755" class="note">Diagram refreshed Pass 2 (2026-05-06). Authoritative source: outputs/AGENTS.md, outputs/ARCHITECTURE.md section 5-6, outputs/OLLAMA_LOCAL_LLM_SPEC.md.</text>
</svg>
