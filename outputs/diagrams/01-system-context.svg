<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="14">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
    <marker id="arrDashed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="1100" height="720" fill="#fff"/>
  <text x="550" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">BooksForge — System Context</text>
  <text x="550" y="58" text-anchor="middle" font-size="13" fill="#64748b">Local-first authoring platform with optional cloud opt-ins</text>

  <!-- User -->
  <g>
    <circle cx="100" cy="360" r="34" fill="#fff" stroke="#0f172a" stroke-width="2"/>
    <circle cx="100" cy="345" r="10" fill="#0f172a"/>
    <path d="M80 370 q20 -15 40 0" stroke="#0f172a" stroke-width="2" fill="none"/>
    <text x="100" y="412" text-anchor="middle" font-weight="600">Author</text>
    <text x="100" y="430" text-anchor="middle" fill="#64748b" font-size="12">writes, edits, exports</text>
  </g>

  <!-- BooksForge desktop -->
  <g>
    <rect x="280" y="220" width="540" height="280" rx="18" fill="#eff6ff" stroke="#1d4ed8" stroke-width="2"/>
    <text x="550" y="252" text-anchor="middle" font-size="17" font-weight="700" fill="#1d4ed8">BooksForge desktop (Tauri)</text>
    <rect x="310" y="280" width="220" height="60" rx="8" fill="#fff" stroke="#1d4ed8"/>
    <text x="420" y="305" text-anchor="middle" font-weight="600">React + TS UI</text>
    <text x="420" y="324" text-anchor="middle" fill="#64748b" font-size="12">editor • outline • AI panel</text>
    <rect x="570" y="280" width="220" height="60" rx="8" fill="#fff" stroke="#1d4ed8"/>
    <text x="680" y="305" text-anchor="middle" font-weight="600">Rust core</text>
    <text x="680" y="324" text-anchor="middle" fill="#64748b" font-size="12">storage • IPC • orchestration</text>
    <rect x="310" y="360" width="480" height="120" rx="8" fill="#fff" stroke="#1d4ed8"/>
    <text x="550" y="385" text-anchor="middle" font-weight="600">Sidecar processes (spawned)</text>
    <g font-size="12" fill="#334155">
      <rect x="328" y="400" width="118" height="36" rx="6" fill="#f8fafc" stroke="#cbd5e1"/>
      <text x="387" y="422" text-anchor="middle">llama.cpp</text>
      <rect x="455" y="400" width="118" height="36" rx="6" fill="#f8fafc" stroke="#cbd5e1"/>
      <text x="514" y="422" text-anchor="middle">Pandoc</text>
      <rect x="582" y="400" width="118" height="36" rx="6" fill="#f8fafc" stroke="#cbd5e1"/>
      <text x="641" y="422" text-anchor="middle">epubcheck</text>
      <rect x="710" y="400" width="78" height="36" rx="6" fill="#f8fafc" stroke="#cbd5e1"/>
      <text x="749" y="422" text-anchor="middle">WASM plugins</text>
      <rect x="328" y="442" width="200" height="30" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-dasharray="4 3"/>
      <text x="428" y="461" text-anchor="middle" fill="#64748b">Ollama (external, optional)</text>
    </g>
  </g>

  <!-- Project bundle -->
  <g>
    <rect x="280" y="540" width="540" height="120" rx="14" fill="#fefce8" stroke="#a16207" stroke-width="2"/>
    <text x="550" y="568" text-anchor="middle" font-weight="700" fill="#854d0e">Project bundle on disk</text>
    <text x="550" y="588" text-anchor="middle" fill="#475569" font-size="12">MyBook.booksforge/  —  manifest.toml • project.db (SQLite) • manuscript/*.md (mirror)</text>
    <text x="550" y="608" text-anchor="middle" fill="#475569" font-size="12">assets/ (content-addressed) • snapshots/ • exports/ • plugins/ • .lock</text>
    <text x="550" y="638" text-anchor="middle" fill="#475569" font-size="12" font-style="italic">User can copy, sync, git, zip — it's just a folder</text>
  </g>

  <!-- Cloud (opt-in) -->
  <g>
    <rect x="880" y="160" width="200" height="380" rx="14" fill="#f5f3ff" stroke="#6d28d9" stroke-width="2" stroke-dasharray="6 4"/>
    <text x="980" y="188" text-anchor="middle" font-weight="700" fill="#6d28d9">Cloud (opt-in)</text>
    <text x="980" y="208" text-anchor="middle" font-size="11" fill="#6d28d9">disabled by default</text>
    <g font-size="12" fill="#334155">
      <rect x="900" y="232" width="160" height="44" rx="8" fill="#fff" stroke="#a78bfa"/>
      <text x="980" y="251" text-anchor="middle" font-weight="600">Cloud LLM providers</text>
      <text x="980" y="266" text-anchor="middle" fill="#64748b">Anthropic • OpenAI • OR</text>
      <rect x="900" y="288" width="160" height="44" rx="8" fill="#fff" stroke="#a78bfa"/>
      <text x="980" y="307" text-anchor="middle" font-weight="600">Marketplace</text>
      <text x="980" y="322" text-anchor="middle" fill="#64748b">plugin signing + sales</text>
      <rect x="900" y="344" width="160" height="44" rx="8" fill="#fff" stroke="#a78bfa"/>
      <text x="980" y="363" text-anchor="middle" font-weight="600">E2EE sync</text>
      <text x="980" y="378" text-anchor="middle" fill="#64748b">opaque ciphertext only</text>
      <rect x="900" y="400" width="160" height="44" rx="8" fill="#fff" stroke="#a78bfa"/>
      <text x="980" y="419" text-anchor="middle" font-weight="600">Updater</text>
      <text x="980" y="434" text-anchor="middle" fill="#64748b">signed binaries</text>
      <rect x="900" y="456" width="160" height="44" rx="8" fill="#fff" stroke="#a78bfa"/>
      <text x="980" y="475" text-anchor="middle" font-weight="600">Telemetry (opt-in)</text>
      <text x="980" y="490" text-anchor="middle" fill="#64748b">no content, ever</text>
    </g>
  </g>

  <!-- Stores -->
  <g>
    <rect x="20" y="540" width="220" height="140" rx="10" fill="#ecfdf5" stroke="#047857" stroke-width="2"/>
    <text x="130" y="568" text-anchor="middle" font-weight="700" fill="#047857">Stores (downstream)</text>
    <text x="130" y="592" text-anchor="middle" font-size="12" fill="#334155">KDP • IngramSpark</text>
    <text x="130" y="610" text-anchor="middle" font-size="12" fill="#334155">Apple Books • Kobo</text>
    <text x="130" y="628" text-anchor="middle" font-size="12" fill="#334155">Google Play</text>
    <text x="130" y="652" text-anchor="middle" font-size="11" fill="#64748b" font-style="italic">user uploads exported file</text>
  </g>

  <!-- Connections -->
  <line x1="135" y1="360" x2="278" y2="360" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="278" y1="380" x2="135" y2="380" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <text x="200" y="350" text-anchor="middle" font-size="11" fill="#475569">writes</text>
  <text x="200" y="395" text-anchor="middle" font-size="11" fill="#475569">renders</text>

  <line x1="550" y1="500" x2="550" y2="538" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <text x="592" y="524" font-size="11" fill="#475569">save / read</text>

  <line x1="820" y1="320" x2="898" y2="270" stroke="#94a3b8" stroke-width="1.6" stroke-dasharray="6 4" marker-end="url(#arrDashed)"/>
  <line x1="820" y1="380" x2="898" y2="370" stroke="#94a3b8" stroke-width="1.6" stroke-dasharray="6 4" marker-end="url(#arrDashed)"/>
  <line x1="820" y1="440" x2="898" y2="478" stroke="#94a3b8" stroke-width="1.6" stroke-dasharray="6 4" marker-end="url(#arrDashed)"/>

  <line x1="240" y1="560" x2="278" y2="560" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <text x="258" y="554" text-anchor="middle" font-size="11" fill="#475569">user uploads</text>

  <!-- Legend -->
  <g transform="translate(20,640)">
    <rect width="240" height="64" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="14" y="22" font-weight="700" fill="#0f172a">Legend</text>
    <line x1="14" y1="38" x2="50" y2="38" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
    <text x="58" y="42" font-size="12" fill="#334155">always-on local interaction</text>
    <line x1="14" y1="56" x2="50" y2="56" stroke="#94a3b8" stroke-width="1.6" stroke-dasharray="6 4" marker-end="url(#arrDashed)"/>
    <text x="58" y="60" font-size="12" fill="#334155">opt-in cloud (off by default)</text>
  </g>
</svg>
