# BooksForge curated model registry.
# Loaded at compile time via include_str!() in registry.rs.
#
# Fields:
#   id              — Ollama pull tag (exact)
#   display_name    — Human-readable label for UI
#   family          — Architecture family (qwen | llama | mistral | gemma | phi)
#   size_bytes      — Approximate download size in bytes
#   ram_min_gb      — Minimum RAM (GB) for comfortable inference
#   context_window  — Maximum context tokens
#   chat_format     — Prompt template format used by Ollama
#   recommended_for — Genres/modes this model suits best
#   strengths       — Short capability descriptors shown in tooltip
#   notes           — One-line user-facing note

[[model]]
id              = "qwen2.5:7b-instruct-q4_K_M"
display_name    = "Qwen 2.5 7B Instruct (Q4)"
family          = "qwen"
size_bytes      = 4_700_000_000
ram_min_gb      = 8
context_window  = 32768
chat_format     = "chatml"
recommended_for = ["fiction", "non_fiction", "memoir"]
strengths       = ["dialogue", "non-english", "instruction-following"]
notes           = "Strong all-rounder; excellent for multilingual fiction."

