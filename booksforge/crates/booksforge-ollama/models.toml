# BooksForge curated model registry.
# Loaded at compile time via include_str!() in registry.rs.
#
# Fields:
#   id               — Ollama pull tag (exact)
#   display_name     — Human-readable label for UI
#   family           — Architecture family
#   size_bytes       — Approximate download size in bytes
#   ram_min_gb       — Minimum RAM (GB) for comfortable inference
#   context_window   — Maximum context tokens
#   chat_format      — Prompt template format used by Ollama
#   recommended_for  — Genres/modes this model suits best
#   strengths        — Short capability descriptors shown in tooltip
#   notes            — One-line user-facing note
#   default_for_modes — Modes this is the recommended default for (empty = not a default)
#   official         — Listed in the UI model picker (false = internal/smoke only)

[[model]]
id               = "qwen2.5:7b-instruct-q4_K_M"
display_name     = "Qwen 2.5 7B Instruct (Q4)"
family           = "qwen"
size_bytes       = 4_700_000_000
ram_min_gb       = 8
context_window   = 32768
chat_format      = "chatml"
recommended_for  = ["fiction", "non_fiction", "memoir"]
strengths        = ["dialogue", "non-english", "instruction-following"]
notes            = "Strong all-rounder; excellent for multilingual fiction."
default_for_modes = ["fiction", "memoir"]
official         = true

# Opt-in upgrade for high-RAM machines.  Surfaced in the model picker as
# "Better quality" but never auto-selected, since it requires 32+ GB RAM and
# a ~24 GB download — incompatible with BooksForge's 8 GB RAM MVP target.
[[model]]
id               = "qwen3.6:latest"
display_name     = "Qwen 3.6 (36B MoE, Q4) — high-end"
family           = "qwen35moe"
size_bytes       = 23_900_000_000
ram_min_gb       = 32
context_window   = 32768
chat_format      = "chatml"
recommended_for  = ["fiction", "non_fiction", "memoir", "academic"]
strengths        = ["long-form-prose", "instruction-following", "multilingual", "reasoning"]
notes            = "Large MoE model with strong narrative coherence; requires 32+ GB RAM."
default_for_modes = []
official         = true

