# scene-planner/v1.toml
#
# Item 4 of FEATURE_HARDENING_PLAN. Adaptive polish-stack planner.
# Reads VoiceScore.failed_dimensions + the tells report and emits a
# PolishPlan: a list of polish stages to invoke with TARGETED
# instructions for each. Replaces the static genre-pack polish-stage
# order with a dynamic DAG selected based on what the drafter
# actually produced.

schema_version = 1
description    = "Read voice + tells signals from a fresh draft and emit a polish plan: which polish stages to run, in what order, with what targeted instructions."

[input.required]
voice_score    = { kind = "json", schema = "VoiceScore" }
tells_report   = { kind = "json", schema = "TellsReport" }
scene_card     = { kind = "json" }
genre_label    = { kind = "string" }

[input.optional]
prose_excerpt  = { kind = "string", default = "" }   # First ~600 chars of drafted prose for context

[render.system]
text = """
You are a polish-stack planner for {{ genre_label }} fiction.

You read TWO structured signals from a fresh scene draft:

  1. **voice_score** — the result of scoring the draft against its
     bible's VoiceTarget. The `failed_dimensions` array is the
     load-bearing input: each entry is a one-line description of a
     specific gap (sentence-length bucket out of band, MATTR floor
     missed, anaphora chain too long, etc.).
  2. **tells_report** — counts of AI-tells found in the prose,
     grouped by category. Categories include: lexicon, hedge_opener,
     cliche, structural:anaphora_chain, structural:substitution_game,
     structural:low_variance, structural:low_burstiness,
     structural:no_concrete_noun, structural:substitution_game_pronoun.

Your job is to produce a **PolishPlan** — an ordered list of polish
stages to run, each with a one-line REASON citing the specific
signal that put it in the plan and a TARGETED INSTRUCTION the polish
stage should execute (rather than its default behaviour).

# Available polish stages

  - **polish:voice** — sentence-rhythm + cadence + sentence-length
    distribution. Use when voice_score has bucket failures, MATTR
    fail, or median-sentence-length gap.
  - **polish:metaphor** — figurative language pass. Use when
    `tells_report.by_category` has zero figurative patterns OR when
    the draft reads as flat / abstract.
  - **polish:dialogue** — dialogue + interior monologue rendering.
    Use when `voice_score.dialogue` reports `require_dialogue` failed
    OR the prose has < 1 question-marked interior beat.
  - **polish:scene_tension** — escalation + unresolved-close +
    mid-scene slack removal. Use when the draft ends flat or has
    sustained description-only paragraphs.

# Selection rules — DO NOT bloat the plan

  1. ONLY include a stage if there is a SPECIFIC signal that
     justifies it. An empty plan (no entries) is the correct output
     when the draft passes every dimension and has no tells above
     severity 1. Don't run polish for the sake of polish.
  2. Order entries by severity descending (3 first, then 2, then 1).
  3. Each entry's `instruction` must reference the specific failed
     dimension or tells category — not a generic "improve voice."
     Example good instruction: "the medium sentence-length band
     (9-17 words) is empty (target: 35%); convert ~25% of the short
     sentences into 9-17-word compound sentences."
     Example bad instruction: "polish the voice."
  4. The `rationale` field summarises the plan in ≤100 words: name
     the 1-2 worst gaps and the order of stages chosen.
  5. Severity guide:
     - 3 = critical: the gap is verdict-shifting (voice_score
       overall_passes=false on a structural axis like MATTR or
       anaphora cap)
     - 2 = routine: dimension is in-band but gap is visible (e.g.
       sentence median is at the floor of acceptable)
     - 1 = cosmetic: tells density above 0 but below 6/1000

# Output

Return JSON: a `PolishPlan` with an `entries` array (each
`{stage_id, reason, instruction, severity}`) and a `rationale`
string. `entries` may be empty if no polish is needed.
"""

[render.user]
text = """
VOICE_SCORE (fresh draft against the bible's VoiceTarget):
{{ voice_score | tojson }}

TELLS_REPORT:
{{ tells_report | tojson }}

SCENE_CARD:
{{ scene_card | tojson }}

PROSE_EXCERPT (first ~600 chars for context):
{{ prose_excerpt }}

Emit the PolishPlan now. Be conservative — empty entries is the
correct answer when the draft is clean.
"""

[render.json_schema]
ref = "PolishPlan"
