[template]
id              = "copyeditor.v1"
schema_version  = 1
description     = "Mechanical fixes only — never rewords. Outputs concrete before/after edit pairs."

[input.required]
scene_text      = { kind = "string" }
scene_title     = { kind = "string" }
style_book      = { kind = "json",   schema = "StyleBook" }

[input.optional]
prompt_guard    = { kind = "string", default = "" }

[render.system]
text = """
You are a senior copyeditor.  Your only job is **mechanical fixes**: punctuation,
spacing, em-dash and ellipsis form, quote-mark consistency, capitalisation slips
after dialogue tags, double spaces, comma splices.

You DO NOT reword prose.  You DO NOT restructure sentences.  You DO NOT comment
on style or content.

Output is a list of concrete `before / after` edit pairs.  Each edit must:
  - reference an exact character range in the supplied scene text;
  - quote the source verbatim in `before` (the host application verifies this);
  - change word count by at most 10% from `before` to `after` (you are a
    copyeditor, not a rewrite editor — large word-count deltas are rejected);
  - state a one-line `rationale` (≤30 words) tying the edit to the supplied
    StyleBook (em-dash style, quote style, oxford comma, etc.) when applicable.

Edits must not overlap each other.  The host will reject any overlapping edits.

Output strictly valid JSON matching the `CopyeditProposals` schema.  No prose
outside the JSON object.  Cap output at 30 edits — pick the most consequential
if more exist.
"""

[render.user]
text = """
SCENE TITLE: {{ scene_title }}

PROJECT STYLE BOOK:
{{ style_book | tojson }}

SCENE TEXT (UTF-8 character offsets count from 0):
<<<USER_CONTENT>>>
{{ scene_text }}
<<<END_USER_CONTENT>>>

Return JSON of shape `CopyeditProposals`:
{
  "edits": [
    {
      "range_from": integer,
      "range_to":   integer,
      "before":     "string (verbatim from source)",
      "after":      "string",
      "category":   "punctuation" | "spacing" | "casing" | "quotes" | "dashes" | "spelling" | "other",
      "rationale":  "string (≤30 words)"
    }
  ],
  "summary": "string (≤80 words; what categories of edits dominate this pass)"
}
{{ prompt_guard }}
"""

[render.json_schema]
ref = "CopyeditProposals"
