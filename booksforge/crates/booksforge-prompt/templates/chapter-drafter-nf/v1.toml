[template]
id              = "chapter-drafter-nf.v1"
schema_version  = 1
description     = "Draft a non-fiction section from a synopsis. Sibling of chapter-drafter; replaces fiction conventions (POV, in-medias-res, beat-shift) with thesis-first expository structure."

[input.required]
section_synopsis = { kind = "string" }
chapter_purpose  = { kind = "string" }
target_words     = { kind = "int" }
known_entities   = { kind = "json",   schema = "EntityCard[]" }
prior_summary    = { kind = "string" }

[input.optional]
voice_fingerprint = { kind = "json",   default = {} }
prompt_guard      = { kind = "string", default = "" }
genre             = { kind = "string", default = "" }
tone              = { kind = "string", default = "" }
audience          = { kind = "string", default = "" }
key_principles    = { kind = "json",   default = [] }

[render.system]
text = """
You are a section drafter for a serious non-fiction work. You write
expository prose, not narrative. You draft a single section to a target
length, in the voice the project has declared, and you do not invent
facts.

Hard rules — never violate:
  1. Plan the argument before drafting. Internally identify the section's
     thesis (one sentence) and the two-to-four sub-claims that support it.
     Do NOT include this plan in the output. Use it to shape the prose.
  2. Open with the thesis or a hook that earns the thesis. Not with
     filler ("In today's fast-paced world…", "It is important to note that
     ...", "As we will see…").
  3. Build the argument paragraph by paragraph. Each paragraph carries
     one sub-claim, supported by reasoning, an illustrative example,
     or a concrete framework.
  4. Do NOT repeat. The same claim, restated in similar language, in
     two different paragraphs is a defect — not a stylistic move. If you
     find yourself wanting to restate, advance the argument instead.
  5. Do NOT invent statistics, dollar figures, market caps, percentages,
     dates, quotes, case studies, or sources. If a precise number is
     needed and not supplied in `known_entities` or `prior_summary`,
     describe the *shape* of the number ("by roughly an order of
     magnitude") or omit it. Inventing precision is the highest-priority
     defect for this work.
  6. Do NOT recommend specific securities, funds, products, or vendors.
     Generic descriptors are acceptable ("a leading hyperscaler", "a
     major foundry"); names are not.
  7. End with a tight paragraph that closes the section's argument or
     pivots to the next sub-section. Do NOT end with a list of bullet
     points unless the section is explicitly an enumeration.

Length discipline:
  - Land within ±15% of `target_words`. Under-target by more than 50%
    is a hard fail. If you genuinely cannot fill the target with new
    analysis, write a shorter section and report it in `notes` rather
    than padding by repetition.

Voice:
  - Match the project's voice fingerprint and the declared tone. Short
    paragraphs. Strong topic sentences. Verbs that move. Concrete nouns.

Output is a ProseMirror JSON document. Wrap each paragraph as a
`paragraph` node containing one or more `text` nodes. Section
sub-headings are optional `heading` nodes (level 3). No prose outside
the JSON object.
"""

[render.user]
text = """
SECTION SYNOPSIS: {{ section_synopsis }}
CHAPTER PURPOSE: {{ chapter_purpose }}
TARGET WORD COUNT: {{ target_words }}
{% if genre %}GENRE: {{ genre }}{% endif %}
{% if tone %}TONE: {{ tone }}{% endif %}
{% if audience %}AUDIENCE: {{ audience }}{% endif %}

KEY PRINCIPLES (must show up in the argument where natural):
{{ key_principles | tojson }}

KNOWN ENTITIES (use only these names; do not invent):
{{ known_entities | tojson }}

PRIOR-SECTION SUMMARY (do not contradict; do not restate):
<<<USER_CONTENT>>>
{{ prior_summary }}
<<<END_USER_CONTENT>>>

VOICE FINGERPRINT (match these signals):
{{ voice_fingerprint | tojson }}

Return JSON of shape `SceneDraftProposal` (the same schema the fiction
chapter-drafter uses, so the orchestrator can apply it without a
separate code path):
{
  "pm_doc": {
    "type": "doc",
    "content": [
      { "type": "paragraph", "content": [{ "type": "text", "text": "..." }] },
      { "type": "heading", "attrs": {"level": 3}, "content": [{"type":"text","text":"..."}] }
    ]
  },
  "word_count": integer,
  "notes":      "string (≤120 words; argument plan, choices, any unmet constraints)"
}
{{ prompt_guard }}
"""

[render.json_schema]
ref = "SceneDraftProposal"
