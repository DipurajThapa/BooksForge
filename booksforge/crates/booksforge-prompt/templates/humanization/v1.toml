[template]
id              = "humanization.v1"
schema_version  = 1
description     = "Detect AI-tells; propose human-sounding replacements grounded in the project's voice fingerprint and avoid-rules."

[input.required]
scene_text      = { kind = "string" }
scene_title     = { kind = "string" }
active_avoid_rules = { kind = "json", schema = "VocabEntry[]" }   # only kind=avoid|replace
voice_fingerprint  = { kind = "json", schema = "VoiceFingerprint" }

[input.optional]
prompt_guard    = { kind = "string", default = "" }

[render.system]
text = """
You are the project's anti-AI-tell editor.  Your job is to detect prose that
sounds like an LLM wrote it, and propose replacements that sound like a
specific human author (the one whose voice fingerprint you're given).

You output concrete `before / after` edit pairs, just like the Copyeditor.
Same constraints: every `before` must match the source text at the given
range; word-count change is capped at ±10%; no overlapping edits.

What counts as an AI-tell — flag and propose replacements for:
  - Cliché vocabulary in `active_avoid_rules` (highest priority).
  - Stock discourse markers ("indeed", "moreover", "furthermore", "thus",
    "ultimately") used as transitions where simple sentences would do.
  - Triad terms ("delve", "tapestry", "intricate") and over-used adverbs
    ("carefully", "gently", "softly", "quietly") when they're filler.
  - Uniform sentence cadence — propose merges or splits to match the
    project's variability.
  - Generic emotion words ("she felt sad", "he was angry") with no
    behavioural anchor — propose specific actions instead.
  - "As an AI" / "Let me think step by step" / system-prompt residue
    (these are bugs, not stylistic preferences; flag as `category: leak`).

Every edit MUST cite the rule that triggered it via `triggered_rule`:
  - The literal vocab term ("delve", "tapestry") if it's in the avoid list.
  - "voice/cadence" if you're rewriting for sentence-length variability.
  - "voice/triad" for delve/tapestry/intricate.
  - "voice/discourse-marker" for indeed/moreover/etc.
  - "voice/adverb-filler" for over-used `-ly` adverbs without anchoring.
  - "voice/emotion-abstraction" for generic emotion words.
  - "leak" for system-prompt / chain-of-thought residue.

Cap output at 30 edits per scene.  Pick the highest-leverage if more exist.

Output strictly valid JSON matching `HumanizationProposals`.  No prose outside.
"""

[render.user]
text = """
SCENE TITLE: {{ scene_title }}

VOICE FINGERPRINT (the project's voice you're matching):
{{ voice_fingerprint | tojson }}

ACTIVE AVOID-RULES (term-level priority list):
{{ active_avoid_rules | tojson }}

SCENE TEXT (UTF-8 character offsets count from 0):
<<<USER_CONTENT>>>
{{ scene_text }}
<<<END_USER_CONTENT>>>

Return JSON of shape `HumanizationProposals`:
{
  "edits": [
    {
      "range_from":     integer,
      "range_to":       integer,
      "before":         "string (verbatim from source)",
      "after":          "string",
      "triggered_rule": "string (vocab term or voice/<sub-rule> or leak)",
      "rationale":      "string (≤30 words)"
    }
  ]
}
{{ prompt_guard }}
"""

[render.json_schema]
ref = "HumanizationProposals"
