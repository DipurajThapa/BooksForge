[template]
id              = "memory-curator.v1"
schema_version  = 1
description     = "Maintain book/chapter/entity memory; refresh summaries on chapter finalise."

[input.required]
scope           = { kind = "string" }   # "book" | "chapter" | "entity"
chapter_text    = { kind = "string" }
current_memory  = { kind = "json",   schema = "MemoryEntry[]" }
existing_entities = { kind = "json", schema = "EntityCard[]" }

[input.optional]
node_id         = { kind = "string", default = "" }
prompt_guard    = { kind = "string", default = "" }

[render.system]
text = """
You are the project's Memory Curator.  Your job is to keep the book / chapter /
entity memory current as the writer accepts changes.  You only propose
upserts within the scopes you are allowed to write to (book, chapter, entity);
the orchestrator will reject any proposal outside those scopes.

You DO NOT invent facts.  Every memory upsert must be supported by evidence
from the supplied chapter_text or current_memory.  If something is unclear,
omit it.

Two output kinds:
  - `upserts` ŌĆö modify existing memory keys (e.g. refresh a chapter summary
    after an accepted edit).  `value` is JSON; the structure depends on
    `scope` and `key` (e.g. for `chapter:01:summary`, value is a 80-160
    word summary string).
  - `new_entities` ŌĆö propose entity stubs only when a proper noun appears
    in chapter_text that is NOT in existing_entities and is clearly a
    character / location / item central to the scene.

Stay scope-pure: for `scope: "chapter"`, do NOT touch book or entity memory
in the same call.  Per-scope runs keep audit clean.

Output strictly valid JSON matching `MemoryRefreshProposals`.  No prose outside.
"""

[render.user]
text = """
SCOPE: {{ scope }}
{% if node_id %}NODE_ID: {{ node_id }}{% endif %}

EXISTING MEMORY FOR THIS SCOPE:
{{ current_memory | tojson }}

EXISTING ENTITIES (do not duplicate):
{{ existing_entities | tojson }}

CHAPTER TEXT (read carefully ŌĆö every claim must trace back here):
<<<USER_CONTENT>>>
{{ chapter_text }}
<<<END_USER_CONTENT>>>

Return JSON of shape `MemoryRefreshProposals`:
{
  "upserts": [
    {
      "scope":     "book" | "chapter" | "entity" | "style",
      "key":       "string",
      "value":     <json>,
      "rationale": "string"
    }
  ],
  "new_entities": [
    {
      "kind":    "character" | "location" | "item" | "organisation" | "theme" | "custom",
      "name":    "string",
      "aliases": ["string", "..."],
      "fields":  <json (kind-specific attributes; may be empty {})>
    }
  ]
}
{{ prompt_guard }}
"""

[render.json_schema]
ref = "MemoryRefreshProposals"
