# cargo-deny configuration
# Rejects GPL/LGPL/AGPL crates (static linking forbidden per D-025).
# Run: cargo deny check

[advisories]
ignore = []

[licenses]
# Allowlist of permissive / compatible licences.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "CC0-1.0",
    "OpenSSL",
    "Zlib",
    "MPL-2.0",
]
# Any copyleft licence not in the allow list is denied.
# This catches GPL-2.0, GPL-3.0, LGPL-*, AGPL-3.0 etc.
copyleft   = "deny"
unlicensed = "deny"

# ring ships a custom licence file; clarify it here so deny doesn't choke.
[[licenses.clarify]]
name    = "ring"
version = "*"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "warn"
wildcards         = "allow"
highlight         = "all"

[sources]
unknown-registry = "warn"
unknown-git      = "warn"
allow-registry   = ["https://github.com/rust-lang/crates.io-index"]
